# Minimal strict allowlist proxy for agent containers

http_port 3128

# Avoid leaking local/private networks through proxy requests
acl localnet src 0.0.0.0/32
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16

# Safe ports
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# Domain allowlist
acl allowed_https dstdomain .openai.com
acl allowed_https dstdomain .api.openai.com
acl allowed_https dstdomain .github.com
acl allowed_https dstdomain .githubusercontent.com
acl allowed_https dstdomain .huggingface.co
acl allowed_https dstdomain .pypi.org
acl allowed_https dstdomain .pythonhosted.org
acl allowed_https dstdomain .npmjs.org
acl allowed_https dstdomain .registry.npmjs.org

# Basic hygiene
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Deny private targets through the proxy
http_access deny localnet

# Only permit listed destinations
http_access allow allowed_https
http_access deny all

cache deny all
access_log stdio:/var/log/squid/access.log
cache_log /var/log/squid/cache.log
pid_filename /tmp/squid.pid
coredump_dir /var/spool/squid