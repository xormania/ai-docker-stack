http_port 3128

acl localnet src 0.0.0.0/32
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16

acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

# Allowlist
acl allowed dstdomain .openai.com
acl allowed dstdomain .api.openai.com
acl allowed dstdomain .github.com
acl allowed dstdomain .githubusercontent.com
acl allowed dstdomain .huggingface.co
acl allowed dstdomain .pypi.org
acl allowed dstdomain .pythonhosted.org
acl allowed dstdomain .npmjs.org
acl allowed dstdomain .registry.npmjs.org

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Do not let the proxy reach RFC1918/private targets
http_access deny localnet

http_access allow allowed
http_access deny all

cache deny all
access_log stdio:/var/log/squid/access.log
cache_log /var/log/squid/cache.log
pid_filename /tmp/squid.pid
coredump_dir /var/spool/squid