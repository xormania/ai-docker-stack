name: ai-docker-stack

networks:
  agent_internal:
    name: ${AGENT_INTERNAL_NETWORK:-agent_internal}
    internal: true

services:
  # Egress control point for agent containers.
  # Replace with a custom-built image/config later if you want tighter control.
  squid:
    image: ${SQUID_IMAGE:-sameersbn/squid:3.5.27-2}
    container_name: ${SQUID_CONTAINER_NAME:-squid}
    restart: unless-stopped
    networks:
      - agent_internal
    volumes:
      - ./security/squid.conf:/etc/squid/squid.conf:ro
      - squid-cache:/var/spool/squid
      - squid-log:/var/log/squid
    read_only: true
    tmpfs:
      - /run
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 3128 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  # Optional hardened override for OpenClaw.
  # This assumes OpenClaw supports standard proxy env vars.
  openclaw:
    depends_on:
      squid:
        condition: service_healthy
    networks:
      - default
      - agent_internal
    environment:
      OPENCLAW_EGRESS_MODE: ${OPENCLAW_EGRESS_MODE:-allowlist}
      OPENCLAW_SANDBOX_MODE: ${OPENCLAW_SANDBOX_MODE:-docker-sandbox}
      HTTP_PROXY: http://squid:3128
      HTTPS_PROXY: http://squid:3128
      ALL_PROXY: http://squid:3128
      NO_PROXY: localhost,127.0.0.1,ollama,postgres,redis,mysql,minio,couchdb,surrealdb,mercure,qdrant,gitea,n8n,searxng,unstructured-api
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /run
    pids_limit: 512
    mem_limit: ${OPENCLAW_MEM_LIMIT:-2g}
    cpus: ${OPENCLAW_CPUS:-2.0}
    # Uncomment if the image supports running as non-root cleanly.
    # user: "${OPENCLAW_UID:-1000}:${OPENCLAW_GID:-1000}"

  # Optional hardened override for OpenHands.
  # Keep it opt-in and do NOT mount docker.sock.
  openhands:
    depends_on:
      squid:
        condition: service_healthy
    networks:
      - default
      - agent_internal
    environment:
      HTTP_PROXY: http://squid:3128
      HTTPS_PROXY: http://squid:3128
      ALL_PROXY: http://squid:3128
      NO_PROXY: localhost,127.0.0.1,ollama,postgres,redis,mysql,minio,couchdb,surrealdb,mercure,qdrant,gitea,n8n,searxng,unstructured-api
      OPENHANDS_ENABLE_DOCKER_SOCKET: "false"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
      - /run
    pids_limit: 512
    mem_limit: ${OPENHANDS_MEM_LIMIT:-2g}
    cpus: ${OPENHANDS_CPUS:-2.0}
    # Uncomment if compatible with the image:
    # user: "${OPENHANDS_UID:-1000}:${OPENHANDS_GID:-1000}"

volumes:
  squid-cache:
  squid-log: